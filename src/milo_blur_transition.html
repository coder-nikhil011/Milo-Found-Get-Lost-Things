
<style>
  @keyframes spin { 0%{transform:rotate(0deg)} 100%{transform:rotate(360deg)} }
  @keyframes fadeIn { 0%{opacity:0} 100%{opacity:1} }
  @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.06)} }
  .blur-bg { filter: blur(4px); pointer-events:none; user-select:none; }
  .btn { border:none;border-radius:10px;padding:10px 20px;cursor:pointer;font-size:13px;font-weight:500; }
</style>
<h2 class="sr-only">Milo page transition blur loader preview</h2>
<div style="position:relative;border-radius:20px;overflow:hidden;min-height:400px;background:#F5F4FF">

  <div id="bg-page" class="blur-bg" style="padding:24px;transition:filter 0.3s">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px">
      <div>
        <div style="font-size:24px;font-weight:700;color:#6C63FF;font-family:Georgia,serif">Milo</div>
        <div style="font-size:11px;color:#888">Kho gaya? Mil jayega.</div>
      </div>
      <button class="btn" style="background:#6C63FF;color:white" onclick="showLoader()">Go to Profile →</button>
    </div>
    <div style="background:white;border-radius:14px;padding:14px;margin-bottom:10px;border:0.5px solid #e0e0e0">
      <div style="display:flex;justify-content:space-between;margin-bottom:8px">
        <span style="background:#FFE5E5;color:#CC0000;font-size:11px;padding:3px 10px;border-radius:20px;font-weight:600">Lost</span>
        <span style="font-size:11px;color:#aaa">Dec 10</span>
      </div>
      <div style="font-weight:600;color:#222;margin-bottom:4px">Blue Backpack</div>
      <div style="font-size:12px;color:#666">Lost near library, has books inside.</div>
    </div>
    <div style="background:white;border-radius:14px;padding:14px;border:0.5px solid #e0e0e0">
      <div style="display:flex;justify-content:space-between;margin-bottom:8px">
        <span style="background:#E5FFE5;color:#006600;font-size:11px;padding:3px 10px;border-radius:20px;font-weight:600">Found</span>
        <span style="font-size:11px;color:#aaa">Dec 11</span>
      </div>
      <div style="font-weight:600;color:#222;margin-bottom:4px">Black Wallet</div>
      <div style="font-size:12px;color:#666">Found near canteen area.</div>
    </div>
  </div>

  <div id="loader" style="display:none;position:absolute;top:0;left:0;right:0;bottom:0;background:rgba(245,244,255,0.6);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);display:none;flex-direction:column;align-items:center;justify-content:center;animation:fadeIn 0.2s ease both;border-radius:20px">
    <div style="position:relative;width:100px;height:100px;display:flex;align-items:center;justify-content:center;margin-bottom:20px">
      <svg style="position:absolute;top:0;left:0;animation:spin 1.6s linear infinite" width="100" height="100" viewBox="0 0 100 100">
        <circle cx="50" cy="50" r="44" fill="none" stroke="#e8e6ff" stroke-width="5"/>
        <circle cx="50" cy="50" r="44" fill="none" stroke="#6C63FF" stroke-width="5" stroke-linecap="round" stroke-dasharray="276" stroke-dashoffset="210"/>
      </svg>
      <div style="width:66px;height:66px;background:white;border-radius:18px;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 20px rgba(108,99,255,0.2);animation:pulse 2s ease-in-out infinite">
        <svg width="36" height="36" viewBox="0 0 72 72">
          <circle cx="36" cy="28" r="13" fill="#6C63FF"/>
          <path d="M16 54 Q36 36 56 54" stroke="#6C63FF" stroke-width="5" fill="none" stroke-linecap="round"/>
          <circle cx="36" cy="28" r="5.5" fill="white"/>
        </svg>
      </div>
    </div>
    <div style="font-size:13px;color:#6C63FF;font-weight:500">Loading profile...</div>
  </div>

</div>

<div style="text-align:center;margin-top:12px;font-size:12px;color:var(--color-text-secondary)">
  "Go to Profile" button dabao — blur transition dekho!
</div>

<script>
function showLoader() {
  const loader = document.getElementById('loader');
  loader.style.display = 'flex';
  setTimeout(() => {
    loader.style.display = 'none';
  }, 2500);
}
</script>
