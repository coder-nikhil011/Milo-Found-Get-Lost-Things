<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  
  <!-- Background -->
  <rect width="200" height="200" rx="50" fill="#6C63FF"/>
  
  <!-- Outer ring -->
  <circle cx="100" cy="90" r="40" fill="rgba(255,255,255,0.15)"/>
  
  <!-- Person head -->
